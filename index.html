<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bm-paper); }
  #root { min-height: 100vh; }
  .bm-btn:hover { box-shadow: 2px 2px 0 0 var(--bm-ink) !important; transform: translate(2px, 2px); }
  .bm-product-card:hover { transform: translate(-2px, -2px); box-shadow: 12px 12px 0 0 var(--bm-ink) !important; }
  a { color: inherit; }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--bm-ink); border-radius: 4px; }
  * { box-sizing: border-box; }
  img, video { max-width: 100%; height: auto; }
  html, body { overflow-x: hidden; }

  /* ---------- NAV: show hamburger, hide desktop links on phones ---------- */
  @media (max-width: 900px) {
    .bm-nav { padding: 0 20px !important; height: 64px !important; }
    .bm-nav-links { display: none !important; }
    .bm-nav-account, .bm-nav-shop { display: none !important; }
    .bm-nav-burger { display: inline-flex !important; }
    .bm-nav-mobile-panel { top: 64px !important; }
  }

  /* ---------- TABLET (≤900px) ---------- */
  @media (max-width: 900px) {
    [style*="grid-template-columns: repeat(3"],
    [style*="grid-template-columns: repeat(4"],
    [style*="gridTemplateColumns: 'repeat(3"],
    [style*="gridTemplateColumns: 'repeat(4"] {
      grid-template-columns: repeat(2, 1fr) !important;
    }
    [style*="grid-template-columns: 1fr 1.4fr"],
    [style*="grid-template-columns: 1fr 1.6fr"],
    [style*="grid-template-columns: 1.2fr 1fr"],
    [style*="grid-template-columns: 1.4fr 1fr"],
    [style*="grid-template-columns: 1fr 2fr"],
    [style*="grid-template-columns: 2fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    h1 { font-size: clamp(48px, 11vw, 96px) !important; }
    h2 { font-size: clamp(36px, 8vw, 64px) !important; }
    section { padding: 56px 32px !important; }
    footer { padding: 56px 32px 32px !important; }
  }

  /* ---------- MOBILE (≤600px) ---------- */
  @media (max-width: 600px) {
    [style*="grid-template-columns: repeat(2"],
    [style*="grid-template-columns: repeat(3"],
    [style*="grid-template-columns: repeat(4"],
    [style*="gridTemplateColumns: 'repeat(2"],
    [style*="gridTemplateColumns: 'repeat(3"],
    [style*="gridTemplateColumns: 'repeat(4"] {
      grid-template-columns: 1fr !important;
      gap: 16px !important;
    }
    h1 { font-size: clamp(40px, 13vw, 72px) !important; line-height: 0.92 !important; }
    h2 { font-size: clamp(32px, 9vw, 48px) !important; line-height: 1 !important; }
    h3 { font-size: clamp(24px, 6vw, 36px) !important; }
    section { padding: 48px 20px !important; }
    footer { padding: 48px 20px 24px !important; }
    section > div[style*="position: absolute"][style*="background: url"] {
      opacity: 0.15 !important;
    }
    body > div > div:first-child[style*="padding: 10px 56px"] {
      padding: 10px 16px !important;
      font-size: 10px !important;
      line-height: 1.4;
    }
    img[src*="cropped-can-"] { max-height: 56vh; width: auto; }
    [style*="font-size: 144"], [style*="fontSize: 144"] { font-size: 64px !important; }
    [style*="font-size: 112"], [style*="fontSize: 112"] { font-size: 56px !important; }
    [style*="font-size: 96"], [style*="fontSize: 96"] { font-size: 48px !important; }
    [style*="font-size: 80"], [style*="fontSize: 80"] { font-size: 44px !important; }
    [style*="font-size: 64"], [style*="fontSize: 64"] { font-size: 38px !important; }
    [style*="position: sticky"] { position: static !important; }
    [style*="display: flex"][style*="justify-content: space-between"] { flex-wrap: wrap !important; }
    [style*="grid-template-columns: 1.4fr 1fr 1fr 1fr"],
    [style*="grid-template-columns: 1.2fr 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 32px !important;
    }
    [style*="font-size: 88"] { font-size: 56px !important; }
    [style*="font-size: 56"] { font-size: 36px !important; }
    footer form { flex-direction: column !important; gap: 8px !important; }
    footer form input { border-radius: 4px !important; border-right: 2px solid rgba(244,239,228,0.4) !important; }
    footer form button { border-radius: 4px !important; }

<body>

<div id="root"></div>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="router.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="scroll-utils.jsx"></script>
<script type="text/babel" src="VariantB.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="ShopPage.jsx"></script>
<script type="text/babel" src="ProductPage.jsx"></script>
<script type="text/babel" src="SciencePage.jsx"></script>
<script type="text/babel" src="AboutPage.jsx"></script>

<script type="text/babel">
function PreLaunchBanner() {
  return (
    <div style={{
      background: 'var(--bm-ink)', color: 'var(--bm-paper)',
      padding: '10px 56px', textAlign: 'center',
      fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase',
    }}>
      Pre-launch · <span style={{ color: 'var(--bm-pink)' }}>Get on the waitlist</span> for first access + launch-day discount
    </div>
  );
}

function Router() {
  const route = useHashRoute();
  const [pathOnly] = route.path.split('?');
  const parts = pathOnly.split('/').filter(Boolean);

  let label = 'Home';
  let body = null;
  if (parts.length === 0) {
    body = <HomePage />; label = '01 Home';
  } else if (parts[0] === 'shop') {
    body = <ShopPage />; label = '02 Shop';
  } else if (parts[0] === 'product' && parts[1]) {
    body = <ProductPage productId={parts[1]} />; label = `03 PDP · ${parts[1]}`;
  } else if (parts[0] === 'science') {
    body = <SciencePage />; label = '04 Science';
  } else if (parts[0] === 'about') {
    body = <AboutPage />; label = '05 About';
  } else {
    body = <HomePage />; label = '01 Home';
  }

  return (
    <div data-screen-label={label}>
      <PreLaunchBanner />
      <Nav />
      {body}
      <Footer />
    </div>
  );
}

function App() {
  return <Router />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
